name: wms_create_order
system: wms
request:
  method: POST
  path: /orders
  headers:
    Content-Type: application/json
    Authorization: ${get_token("wms")}
  json:
    order_no: ${gen_order_no("AUTO_WMS")}
    materials: []
extract:
  order_no: $.data.orderNo
validate:
  - eq: [status_code, 200]
