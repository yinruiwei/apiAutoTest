# testcases/scenarios/test_wms_login.yaml
name: "WMS登录模块"
config:
  module: "WMS_AUTH"
  allure:
    epic: "WMS"
    feature: "登录模块"


teststeps:
  - name: "用例1：[反向] 使用错误的密码登录"
    api: "api/wms/login.yaml"
    variables:
      username: '${wms_login_username()}'
      password: "123456"
    validate:
      # 业务码 1000；部分后端对「错密」与「无账号」统一文案为「账号不存在」，用正则兼容
      - assert_type: "eq"
        jsonpath: "$.code"
        expect_value: 6302
      - assert_type: "regex"
        jsonpath: "$.message"
        expect_value: "用户名或密码错误"

  - name: "用例2：[反向] 账号不存在时登录"
    api: "api/wms/login.yaml"
    variables:
      username: "ghost_user"
      password: "123"
    validate:
      - assert_type: "eq"
        jsonpath: "$.code"
        expect_value: 1000
      - assert_type: "contains"
        jsonpath: "$.message"
        expect_value: "账号不存在"

  - name: "用例3：[正向] 正确的账号密码登录成功"
    api: "api/wms/login.yaml"
    variables:
      username: '${wms_login_username()}'
      password: '${wms_login_password()}'
    extract:
      - var_name: "wms_token"  # 把成功获取的 token 提出来
        jsonpath: "$.data"
    validate:
      - assert_type: "eq"
        jsonpath: "$.code"
        expect_value: 200