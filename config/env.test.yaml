# config/env.test.yaml
project_name: "智能仓储测试系统-test环境"

base_urls:
  wms: "http://127.0.0.1:2023/wms"
  rms: "http://127.0.0.1:15000/rms-wcs"
  pda: "http://127.0.0.1:2023/wms"
  hub: "http://127.0.0.1:15000"

# WMS / RMS 登录场景账号互相独立，分别维护（须与对应 base_urls 环境一致）
wms_login_test_account:
  username: "admin"
  password: ""

rms_login_test_account:
  username: "admin"
  password: ""

report:
  title: "RMS-V1.0 自动化测试报告"
  tester_name: "RMS-V1.0基础接口用例"
  allure_port: 5050

databases:
  wms_db:
    host: "127.0.0.1"
    port: 3306
    user: "root"
    password: "your_password"
    db_name: "your_db"

  rms_db:
    host: "127.0.0.1"
    port: 3306
    user: "root"
    password: "your_password"
    db_name: "your_db"

redis:
  host: "127.0.0.1"
  port: 6379
  db: 8
  timeout: 10

notify:
  # TODO:待完善飞书、企业微信等
  feishu_webhook: ""
  dingding:
    webhook: "https://oapi.dingtalk.com/robot/send?access_token="
    secret_type: "sign"     # sign 或 keywords
    secret: "your_secret"
    send: false             # true 时才会触发发送

email:
  host: "smtp.qq.com"
  port: 465
  user: "your_sender@qq.com"
  password: "your_auth_code" # QQ/网易邮箱的授权码
  receiver:
    - "leader@company.com"
    - "qa_team@company.com"
  ssl: true
  send: false # 设为 true 才会触发发送

