# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: end-of-file_manage-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: debug-statements
      - id: check-case-conflict
      - id: name-tests-test
        args: ['--pytest']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args:
          - '--fix'
          - '--unsafe-fixes'
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.10
    hooks:
      - id: uv-lock
      - id: uv-export
        args:
          - '--frozen'
          - '-o'
          - 'requirements.txt'
          - '--no-hashes'
          - '--quiet'
